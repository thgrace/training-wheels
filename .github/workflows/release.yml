name: Release

on:
  push:
    tags:
      - "v*"

permissions: read-all

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  args:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ldflags.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - id: ldflags
        run: |
          echo "version=$(git describe --tags --always --dirty | cut -c2-)" >> "$GITHUB_OUTPUT"

  build:
    needs: [test, args]
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/builder_go_slsa3.yml@v2.1.0
    with:
      go-version-file: go.mod
      config-file: .slsa-goreleaser/${{ matrix.os }}-${{ matrix.arch }}.yml
      evaluated-envs: "VERSION:${{needs.args.outputs.version}}"
      upload-assets: true
      draft-release: "true"
      private-repository: ${{ github.event.repository.private }}

  checksums:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "tw-*" \
            --dir artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum tw-* > checksums.txt

      - name: Upload checksums to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            artifacts/checksums.txt \
            --clobber \
            --repo "${{ github.repository }}"

  publish-release:
    needs: checksums
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          release_id="$(
            gh api --paginate "repos/${{ github.repository }}/releases?per_page=100" \
              --jq '.[] | select(.tag_name == env.TAG_NAME) | .id' \
              | head -n1
          )"
          if [[ -z "$release_id" ]]; then
            echo "Release not found for tag $TAG_NAME" >&2
            exit 1
          fi
          gh api \
            --method PATCH \
            "repos/${{ github.repository }}/releases/${release_id}" \
            -F draft=false
