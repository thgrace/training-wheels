name: Release

on:
  push:
    tags:
      - "v*"

permissions: read-all

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  args:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ldflags.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - id: ldflags
        run: |
          echo "version=$(git describe --tags --always --dirty | cut -c2-)" >> "$GITHUB_OUTPUT"

  build:
    needs: [test, args]
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/builder_go_slsa3.yml@v2.1.0
    with:
      go-version-file: go.mod
      config-file: .slsa-goreleaser/${{ matrix.os }}-${{ matrix.arch }}.yml
      evaluated-envs: "VERSION:${{needs.args.outputs.version}}"
      upload-assets: true
      draft-release: "true"
      private-repository: ${{ github.event.repository.private }}

  checksums:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download release binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "tw-*" \
            --dir artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum tw-* > checksums.txt

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: sbom.cdx.json
          output-file: artifacts/sbom.cdx.json

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            artifacts/checksums.txt \
            artifacts/sbom.cdx.json \
            --clobber \
            --repo "${{ github.repository }}"

  cosign-sign:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Download release binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "tw-*" \
            --dir artifacts

      - name: Sign binaries with cosign keyless
        run: |
          cd artifacts
          for f in tw-*; do
            cosign sign-blob --yes --bundle "${f}.bundle" "$f"
          done

      - name: Upload signature bundles
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            artifacts/*.bundle \
            --clobber \
            --repo "${{ github.repository }}"

  attest:
    needs: [checksums, cosign-sign]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - name: Download release binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "tw-*" \
            --dir artifacts
          # Remove non-binary files (bundles, provenance) so attestation targets only binaries
          rm -f artifacts/*.bundle artifacts/*.intoto.jsonl

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'artifacts/tw-*'

  publish-release:
    needs: attest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          release_id="$(
            gh api --paginate "repos/${{ github.repository }}/releases?per_page=100" \
              --jq '.[] | select(.tag_name == env.TAG_NAME) | .id' \
              | head -n1
          )"
          if [[ -z "$release_id" ]]; then
            echo "Release not found for tag $TAG_NAME" >&2
            exit 1
          fi
          gh api \
            --method PATCH \
            "repos/${{ github.repository }}/releases/${release_id}" \
            -F draft=false
