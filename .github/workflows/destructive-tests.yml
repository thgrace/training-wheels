name: Destructive Command Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Build tw
        run: go build -o tw ./cmd/tw/

      - name: Upload tw binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tw-binary
          path: tw
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pack:
          - ai
          - api-gateway
          - backup
          - bypass
          - cdn
          - cicd
          - cloud
          - containers
          - context
          - core
          - database
          - dns
          - email
          - feature-flags
          - hook-protocol
          - infrastructure
          - interpreters
          - kubernetes
          - load-balancer
          - macos
          - messaging
          - monitoring
          - packages
          - payment
          - platform
          - remote
          - search
          - secrets
          - storage
          - strict-git
          - system
          - windows
    name: test (${{ matrix.pack }})
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download tw binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tw-binary

      - name: Install tw
        run: chmod +x tw && sudo mv tw /usr/local/bin/tw

      - name: Configure tw for tests
        run: echo "TW_PACKS_ENABLED=core,database,cloud,containers,kubernetes,infrastructure,system,remote,secrets,package_managers,platform,cicd,search,interpreters,dns,email,messaging,monitoring,storage,payment,cdn,apigateway,backup,featureflags,loadbalancer,ai,strict_git,windows" >> "$GITHUB_ENV"

      - name: Run ${{ matrix.pack }} tests
        run: .github/scripts/run-destructive-tests.sh .github/scripts/tests/test-${{ matrix.pack }}.sh

      - name: Upload failure report
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: failures-${{ matrix.pack }}
          path: /tmp/tw-destructive-failures.txt
