name: Hook Lab

# Manual dispatch — run from Actions tab or gh CLI:
#   gh workflow run hook-lab.yml
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Linux container (Claude via OpenRouter) ──────────────────────
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code || true

      - name: Install Gemini CLI
        run: |
          npm install -g @anthropic-ai/gemini-cli 2>/dev/null || \
          npm install -g github:google-gemini/gemini-cli 2>/dev/null || true

      - name: Configure hooks
        run: |
          HOOK="$(pwd)/labs/hooks/log-hook.sh"
          chmod +x "$HOOK"
          export HOOK_LAB_OUTPUT="$(pwd)/labs/output"
          mkdir -p "$HOOK_LAB_OUTPUT"

          # Claude
          mkdir -p ~/.claude
          jq --arg cmd "$HOOK claude" \
            '{"hooks":{"PreToolUse":[{"hooks":[{"type":"command","command":$cmd}]}]}}' \
            -n > ~/.claude/settings.json

          # Gemini
          mkdir -p ~/.gemini
          jq --arg cmd "$HOOK gemini" \
            '{"hooks":{"BeforeTool":[{"hooks":[{"type":"command","command":$cmd}]}]}}' \
            -n > ~/.gemini/settings.json

      - name: Run Claude Code (OpenRouter)
        if: ${{ vars.OPEN_ROUTER_TOKEN != '' || secrets.OPEN_ROUTER_TOKEN != '' }}
        env:
          ANTHROPIC_BASE_URL: "https://openrouter.ai/api"
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.OPEN_ROUTER_TOKEN || vars.OPEN_ROUTER_TOKEN }}
          ANTHROPIC_API_KEY: ""
          OPEN_ROUTER_MODEL: ${{ vars.OPEN_ROUTER_MODEL || 'nvidia/nemotron-3-super-120b-a12b:free' }}
          HOOK_LAB_OUTPUT: ${{ github.workspace }}/labs/output
        run: |
          echo "Run this exact shell command and nothing else: echo hook-lab-claude" | \
            claude -p --model "$OPEN_ROUTER_MODEL" --allowedTools "Bash" \
            2> labs/output/claude_stderr.log || true

      - name: Run Gemini CLI
        if: ${{ secrets.GEMINI_API_KEY != '' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HOOK_LAB_OUTPUT: ${{ github.workspace }}/labs/output
        run: |
          gemini -m gemini-2.5-flash --yolo \
            -p "Run this exact shell command and nothing else: echo hook-lab-gemini" \
            2> labs/output/gemini_stderr.log || true

      - name: Show results
        if: always()
        run: |
          echo "=== Captured payloads ==="
          cat labs/output/combined.log 2>/dev/null || echo "(none)"
          echo ""
          echo "=== Stderr logs ==="
          for f in labs/output/*_stderr.log; do
            [ -s "$f" ] && echo "--- $(basename "$f") ---" && cat "$f" && echo ""
          done

      - name: Upload payloads
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hook-payloads-linux
          path: labs/output/

  # ── Windows (Claude + Copilot via native shells) ─────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
        continue-on-error: true

      - name: Install GitHub Copilot CLI
        run: |
          gh extension install github/gh-copilot 2>$null
          gh copilot --version 2>$null
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        shell: pwsh

      - name: Configure hooks
        shell: pwsh
        run: |
          $Hook = "${{ github.workspace }}\labs\hooks\log-hook.ps1"
          $OutDir = "${{ github.workspace }}\labs\output"
          New-Item -ItemType Directory -Force -Path $OutDir | Out-Null
          [Environment]::SetEnvironmentVariable("HOOK_LAB_OUTPUT", $OutDir, "Process")

          # Claude
          $claudeDir = "$env:USERPROFILE\.claude"
          New-Item -ItemType Directory -Force -Path $claudeDir | Out-Null
          @{hooks=@{PreToolUse=@(@{hooks=@(@{type="command";command="powershell -File $Hook claude"})})}} |
            ConvertTo-Json -Depth 10 | Set-Content "$claudeDir\settings.json"

          # Copilot
          $copilotDir = "$env:USERPROFILE\.copilot"
          New-Item -ItemType Directory -Force -Path $copilotDir | Out-Null
          @{version=1;hooks=@{preToolUse=@(@{type="command";bash="bash ${{ github.workspace }}/labs/hooks/log-hook.sh copilot";powershell="powershell -File $Hook copilot"})}} |
            ConvertTo-Json -Depth 10 | Set-Content "$copilotDir\config.json"

      - name: Run Claude Code (OpenRouter on Windows)
        if: ${{ vars.OPEN_ROUTER_TOKEN != '' || secrets.OPEN_ROUTER_TOKEN != '' }}
        shell: pwsh
        env:
          ANTHROPIC_BASE_URL: "https://openrouter.ai/api"
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.OPEN_ROUTER_TOKEN || vars.OPEN_ROUTER_TOKEN }}
          ANTHROPIC_API_KEY: ""
          HOOK_LAB_OUTPUT: ${{ github.workspace }}\labs\output
        run: |
          $model = if ("${{ vars.OPEN_ROUTER_MODEL }}") { "${{ vars.OPEN_ROUTER_MODEL }}" } else { "nvidia/nemotron-3-super-120b-a12b:free" }
          "Run this exact shell command and nothing else: echo hook-lab-claude" |
            claude -p --model $model --allowedTools "Bash" 2>> labs\output\claude_stderr.log
        continue-on-error: true

      - name: Run Copilot CLI (Windows)
        if: ${{ secrets.COPILOT_TOKEN != '' }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          HOOK_LAB_OUTPUT: ${{ github.workspace }}\labs\output
        run: |
          gh copilot -p "Run this exact shell command and nothing else: echo hook-lab-copilot" --allow-all-tools 2>> labs\output\copilot_stderr.log
        continue-on-error: true

      - name: Show results
        if: always()
        shell: pwsh
        run: |
          Write-Host "=== Captured payloads ==="
          $log = "labs\output\combined.log"
          if (Test-Path $log) { Get-Content $log } else { Write-Host "(none)" }
          Write-Host ""
          Write-Host "=== Stderr logs ==="
          Get-ChildItem labs\output\*_stderr.log | Where-Object { $_.Length -gt 0 } | ForEach-Object {
            Write-Host "--- $($_.Name) ---"
            Get-Content $_.FullName
            Write-Host ""
          }

      - name: Upload payloads
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hook-payloads-windows
          path: labs/output/
